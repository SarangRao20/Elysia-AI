<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarang's Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .profile-card { max-width: 600px; margin: 50px auto; background: #fff; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .card-header { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; padding: 30px; text-align: center; }
        .card-header h1 { margin: 0; font-size: 2.5rem; font-weight: 700; }
        .card-body { padding: 30px; }
        .info-item { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .info-label { font-weight: bold; color: #555; display: block; margin-bottom: 5px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        .info-value { font-size: 1.1rem; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-card">
            <div class="card-header">
                <h1>Sarang</h1>
                <p>User Profile</p>
            </div>
            <div class="card-body">
                <div class="info-item">
                    <span class="info-label">Preferences</span>
                    <p class="info-value">Uses regular Chrome browser.</p>
                    <p class="info-value">Prefers conversing in Marathi.</p>
                </div>
                <div class="info-item">
                    <span class="info-label">Active Goals</span>
                    <p class="info-value">Learned Depth-First Search (DFS) implementation and intuition.</p>
                </div>
                <div class="info-item">
                    <span class="info-label">Current Project</span>
                    <p class="info-value">Working on the IITM BS Degree program portal login page.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
